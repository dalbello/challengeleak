<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ChallengeLeak — Cloudflare Challenge Revenue Leak Monitor{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Find Cloudflare challenge false positives that kill conversion and attribution. Quantify revenue-at-risk per rule and join the beta waitlist.{% endblock %}">
    <link rel="canonical" href="https://challengeleak.tinyship.ai/">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://challengeleak.tinyship.ai/">
    <meta property="og:title" content="ChallengeLeak — Cloudflare Challenge Revenue Leak Monitor">

    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:site_name" content="ChallengeLeak">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ChallengeLeak — Cloudflare Challenge Revenue Leak Monitor">

    <meta name="twitter:image" content="https://challengeleak.tinyship.ai/static/img/og-image.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://umami.app-ninja.com/script.js" data-website-id="9092650c-14c7-48e8-ae3f-7990c5b8789c"></script>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    {% block content %}{% endblock %}

    <footer class="bg-slate-900 text-slate-400 py-10 mt-16">
        <div class="max-w-5xl mx-auto px-4 text-center text-sm">
            <p>&copy; 2026 <a href="https://tinyship.ai" class="text-emerald-400 hover:text-emerald-300">tinyship.ai</a></p>
            <p class="mt-2">
                <a href="/privacy/" class="hover:text-white">Privacy</a> ·
                <a href="/terms/" class="hover:text-white">Terms</a>

    {% block extra_js %}{% endblock %}
